<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Landing</title>
    <meta
      name="description"
      content="Simple demo landing page on GitHub Pages"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.6;
      }
      .box {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 24px;
      }
      .btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 10px;
        text-decoration: none;
        border: 1px solid #111;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Test Landing Page</h1>
      <p>Это мой первый тестовый лендинг на GitHub Pages.</p>

      <h2>Что здесь есть</h2>
      <ul>
        <li>Заголовок</li>
        <li>Короткое описание</li>
        <li>Кнопка</li>
        <li>FAQ-блок</li>
      </ul>

      <a class="btn" href="#">Open</a>

      <h2>FAQ</h2>
      <p><strong>Что это?</strong><br />Тестовая страница для практики.</p>
      <p><strong>Где хостится?</strong><br />На GitHub Pages.</p>
    </div>
  </body>
</html>
